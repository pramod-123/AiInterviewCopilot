<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="theme.js"></script>
    <title>Interview Copilot</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <div class="brand">
        <img class="brand-logo" src="icons/icon-48.png" alt="" width="28" height="28" />
        <span>Interview <span class="accent">Copilot</span></span>
      </div>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="btnPopupTheme" title="Appearance" aria-label="Toggle light and dark mode">
          <span class="material-symbols-outlined" aria-hidden="true">light_mode</span>
        </button>
        <button type="button" class="icon-btn" id="btnSettings" title="API settings" aria-expanded="false">
          <span class="material-symbols-outlined" aria-hidden="true">settings</span>
        </button>
        <button type="button" class="icon-btn" id="btnHelp" title="Help" aria-expanded="false">
          <span class="material-symbols-outlined" aria-hidden="true">help</span>
        </button>
      </div>
    </header>

    <main class="popup-main">
      <section class="status-dot-wrap" aria-live="polite">
        <div class="status-dot" id="statusDot" aria-hidden="true"></div>
        <h1 class="hero-title" id="heroTitle">Ready</h1>
        <p class="hero-sub" id="heroSub">LeetCode capture • Standby</p>
      </section>

      <label class="mic-bento mic-bento-mic" for="chkPopupMic">
        <span class="mic-bento-inner">
          <span class="mic-icon-wrap">
            <span class="material-symbols-outlined fill" aria-hidden="true">mic</span>
          </span>
          <span class="mic-copy">
            <h3>Record microphone</h3>
            <p>Tab video + your voice</p>
          </span>
        </span>
        <span class="switch" aria-hidden="true">
          <span class="switch-knob"></span>
        </span>
        <input type="checkbox" id="chkPopupMic" class="sr-only" checked />
      </label>

      <label class="mic-bento mic-bento-live" for="chkPopupLiveInterviewer">
        <span class="mic-bento-inner">
          <span class="mic-icon-wrap">
            <span class="material-symbols-outlined fill" aria-hidden="true">graphic_eq</span>
          </span>
          <span class="mic-copy">
            <h3>Live voice interviewer</h3>
            <p>Gemini Live while recording; off = transcript only after you end</p>
          </span>
        </span>
        <span class="switch" aria-hidden="true">
          <span class="switch-knob"></span>
        </span>
        <input type="checkbox" id="chkPopupLiveInterviewer" class="sr-only" checked />
      </label>

      <div id="settingsPanel" class="panel-block hidden">
        <label class="field-label" for="apiBase">API base URL</label>
        <input id="apiBase" type="url" placeholder="http://127.0.0.1:3001" autocomplete="off" />
      </div>

      <div id="helpPanel" class="panel-block hidden">
        <p class="help-text">
          Open this popup from a <strong>leetcode.com</strong> problem tab. Start session opens the
          <strong>side panel</strong> recorder (reliable mic access). Use <strong>History</strong> for past sessions,
          video, and feedback.
        </p>
      </div>

      <section class="actions">
        <button type="button" class="btn-primary" id="start">
          <span class="material-symbols-outlined fill" aria-hidden="true">play_arrow</span>
          <span>Start session</span>
        </button>
        <button type="button" class="btn-secondary" id="openSessions">
          <span class="material-symbols-outlined" aria-hidden="true">history</span>
          <span>History</span>
        </button>
      </section>

      <p id="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
