<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prism verify</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sessions.css" />
    <link rel="stylesheet" href="vendor/prism/prism-code-theme.css" />
    <link rel="stylesheet" href="prism-fence-tokens.css" />
  </head>
  <body style="padding: 24px; background: #0a0a0b">
    <p id="status">Running…</p>
    <div id="out" class="md-content" style="max-width: 640px"></div>
    <script src="vendor/prism/prism-bundle.min.js" data-manual></script>
    <script src="markdownRender.js"></script>
    <script>
      (function () {
        const st = document.getElementById("status");
        const out = document.getElementById("out");
        const md = window.InterviewCopilotMarkdown;
        const prism = typeof Prism !== "undefined";
        const java = prism && Prism.languages && Prism.languages.java;
        const sample = "```java\npublic class Demo {\n  public static void main(String[] args) {\n    System.out.println(\"hi\");\n  }\n}\n```";
        if (!md) {
          st.textContent = "FAIL: InterviewCopilotMarkdown missing";
        } else if (!prism) {
          st.textContent = "FAIL: Prism missing";
        } else if (!java) {
          st.textContent = "FAIL: Prism.languages.java missing";
        } else {
          md.appendMarkdownToElement(out, sample);
          const code = out.querySelector("pre.md-fence code");
          const hasToken = code && code.querySelector(".token.keyword");
          st.textContent = hasToken
            ? "OK: " + code.querySelectorAll(".token").length + " token span(s)"
            : "FAIL: no .token spans (innerHTML len " + (code ? code.innerHTML.length : 0) + ")";
        }
      })();
    </script>
  </body>
</html>
