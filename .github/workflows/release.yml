# Build a self-contained server tarball per OS/arch (dist + pruned node_modules + prisma).
# Publishes assets to a GitHub Release when:
#   - You push tag v*.*.* (publish runs automatically), or
#   - You run "Run workflow" and set `tag` (e.g. v1.2.3) — create/push the tag first if needed.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3). Required for manual runs so publish-release is not skipped."
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    working-directory: server

jobs:
  build-chrome-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pack Chrome extension (MV3)
        run: |
          # defaults.run.working-directory is server/; extension sources live at repo root.
          (cd "${GITHUB_WORKSPACE}/browser-extension/chrome" && zip -r "${GITHUB_WORKSPACE}/ai-interview-copilot-chrome-extension.zip" .)
          ls -la "${GITHUB_WORKSPACE}/ai-interview-copilot-chrome-extension.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: chrome-extension
          path: ai-interview-copilot-chrome-extension.zip

  build-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x64
          - os: macos-14
            asset_suffix: darwin-arm64
          # macos-13 was removed from GitHub-hosted runners; use Intel image for darwin-x64 tarball.
          - os: macos-15-intel
            asset_suffix: darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install, generate client, build, prune devDependencies
        run: |
          npm ci
          npx prisma generate
          npm run build
          npm prune --omit=dev
          PRISMA_VER="$(node -p "require('./package-lock.json').packages['node_modules/prisma'].version")"
          npm install "prisma@${PRISMA_VER}" --omit=dev --no-save

      - name: Pack tarball
        run: |
          mkdir -p icons
          cp "${GITHUB_WORKSPACE}/browser-extension/chrome/icons/icon-512.png" icons/icon-512.png
          ASSET="ai-interview-copilot-server-${{ matrix.asset_suffix }}.tar.gz"
          tar czf "../${ASSET}" \
            dist node_modules package.json package-lock.json \
            prisma prisma.config.ts .env.example \
            prompts agents \
            icons/icon-512.png
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "../${ASSET}" | awk '{print $1}' > "../${ASSET}.sha256"
          else
            shasum -a 256 "../${ASSET}" | awk '{print $1}' > "../${ASSET}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.asset_suffix }}
          path: |
            ai-interview-copilot-server-${{ matrix.asset_suffix }}.tar.gz
            ai-interview-copilot-server-${{ matrix.asset_suffix }}.tar.gz.sha256

  publish-release:
    needs:
      - build-assets
      - build-chrome-extension
    runs-on: ubuntu-latest
    if: >
      (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
